<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tankstar</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }
        body {
            background: none;
        }
        .container {
            width: 200px;
            height: 100px;
            border:  1px solid black;
            position: fixed;
            transform: translateX(-50%);
            left: 50%;
            top: 100px;
            border-radius: 15px;

        }
        #skip-chest-animation {
            position: fixed;
            transform: translateX(-50%);
            left: 50%;
            top: 30px;
            color: white;
            background-color: red;
            border-radius: 15px;
        }
        #skip-chest-animation:hover {
            background-color: blue;
            color: black;
        }
    </style>
</head>
<body>
    <div class="container">
        <button id="skip-chest-animation" onclick="fc1()">Skip Chest Animation</button>
    </div>
    <script>
       h5gg.require(7.9);

    var h5frida = h5gg.loadPlugin("h5frida", "h5frida-15.1.24.dylib");
    if(!h5frida) throw "Failed to load h5frida plugin";
    alert("frida plugin version="+h5frida.pluginVersion() + "\nfrida core version="+h5frida.coreVersion());
    function ActiveCodePatch(fpath, rvaddr, bytes) {
        if(!h5frida.ActiveCodePatch(fpath, rvaddr, bytes)) {
            var result = h5frida.ApplyCodePatch(fpath, rvaddr, bytes);
            alert(fpath+":0x"+rvaddr.toString(16)+"-PatchFailed!\n" + result);return false;
        } return true;
    }
    function DeactiveCodePatch(fpath, rvaddr, bytes) {
        return h5frida.DeactiveCodePatch(fpath, rvaddr, bytes);
    }
    function fc1() {
        var result = ActiveCodePatch("Frameworks/UnityFramework.framework/UnityFramework", 0x6D14FF8,  "0xD65F03C0");
        if(result) {
            alert("Da block thanh cong");
        } else {
            alert("That bai");
        };
    };

    </script>
</body>
</html>
